<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird - Interactive Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #2d2d2d;
            font-family: 'Press Start 2P', cursive;
            touch-action: none; /* Prevent zoom on mobile */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            image-rendering: pixelated; /* Retro feel */
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .interactive-ui {
            pointer-events: auto;
        }

        /* CRT Scanline Effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.3;
        }
        
        .hidden {
            display: none !important;
        }

        .btn {
            background: #e76e55;
            border: 4px solid #fff;
            box-shadow: 0 6px 0 #c0392b;
            color: white;
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c0392b;
        }

        .score-display {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-size: 40px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 8;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>

    <!-- Score HUD -->
    <div id="scoreHud" class="score-display hidden">0</div>

    <!-- Start Screen -->
    <div id="startScreen" class="ui-layer interactive-ui">
        <h1 class="text-4xl md:text-6xl text-yellow-400 mb-4 text-center drop-shadow-[4px_4px_0_rgba(0,0,0,1)]" style="-webkit-text-stroke: 2px black;">FLAPPY<br>BIRD</h1>
        <div class="text-white text-sm mb-8 animate-pulse text-center">TAP, CLICK OR SPACE TO JUMP</div>
        <button id="startBtn" class="btn">START GAME</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="ui-layer interactive-ui hidden">
        <div class="bg-[#ded895] border-4 border-[#554800] p-6 text-center shadow-[0_0_0_4px_#fff]">
            <h2 class="text-orange-600 text-2xl mb-4 drop-shadow-md">GAME OVER</h2>
            <div class="flex justify-between gap-8 mb-4">
                <div class="text-left">
                    <p class="text-xs text-orange-800 mb-1">SCORE</p>
                    <p id="finalScore" class="text-xl text-white drop-shadow-md">0</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-orange-800 mb-1">BEST</p>
                    <p id="bestScore" class="text-xl text-white drop-shadow-md">0</p>
                </div>
            </div>
            <div class="mb-4">
                <p id="medalText" class="text-xs text-blue-800 mb-2">NEW MEDAL!</p>
                <div id="medalDisplay" class="w-12 h-12 mx-auto bg-[#c0c0c0] rounded-full border-4 border-white shadow-inner flex items-center justify-center text-xs">
                    <!-- Medal injected by JS -->
                </div>
            </div>
            <button id="restartBtn" class="btn">TRY AGAIN</button>
        </div>
    </div>
</div>

<script>
    /**
     * FLAPPY BIRD ENGINE
     * Built with HTML5 Canvas + Tone.js for audio synthesis.
     */

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreHud = document.getElementById('scoreHud');
    const finalScoreEl = document.getElementById('finalScore');
    const bestScoreEl = document.getElementById('bestScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const medalDisplay = document.getElementById('medalDisplay');
    const medalText = document.getElementById('medalText');

    // Game Constants
    const GRAVITY = 0.25;
    const JUMP_STRENGTH = -4.6;
    const PIPE_SPEED = 2;
    const PIPE_SPAWN_RATE = 100; // Frames
    const GAP_HEIGHT = 120; // Space between pipes
    
    // Game State
    let frames = 0;
    let score = 0;
    let highScore = localStorage.getItem('flappy_highscore') || 0;
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let pipes = [];
    let particles = [];
    let bgOffset = 0;
    
    // Audio Context (Tone.js)
    let synth, noiseSynth, metalSynth;
    let audioInitialized = false;

    // Resize Handling
    let width, height;
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Audio System ---
    async function initAudio() {
        if (audioInitialized) return;
        await Tone.start();
        
        // Synthesizer for jumps and UI
        synth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "square" },
            envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 }
        }).toDestination();
        synth.volume.value = -10;

        // Noise synth for hits
        noiseSynth = new Tone.NoiseSynth({
            noise: { type: 'pink' },
            envelope: { attack: 0.005, decay: 0.1, sustain: 0 }
        }).toDestination();

        // Metal synth for score
        metalSynth = new Tone.MetalSynth({
            frequency: 200,
            envelope: { attack: 0.001, decay: 0.1, release: 0.01 },
            harmonicity: 5.1,
            modulationIndex: 32,
            resonance: 4000,
            octaves: 1.5
        }).toDestination();
        metalSynth.volume.value = -15;

        audioInitialized = true;
    }

    function playSound(type) {
        if (!audioInitialized) return;
        try {
            switch (type) {
                case 'jump':
                    synth.triggerAttackRelease("C4", "16n");
                    break;
                case 'score':
                    metalSynth.triggerAttackRelease("32n");
                    // Add a little harmony
                    setTimeout(() => synth.triggerAttackRelease("E5", "32n"), 50);
                    break;
                case 'hit':
                    noiseSynth.triggerAttackRelease("8n");
                    break;
                case 'die':
                    synth.triggerAttackRelease("A2", "8n");
                    break;
                case 'swoosh':
                    // Simulated with noise filter sweep
                    const filter = new Tone.Filter(1000, "lowpass").toDestination();
                    const noise = new Tone.Noise("pink").connect(filter);
                    noise.start();
                    filter.frequency.rampTo(100, 0.2);
                    noise.stop("+0.2");
                    break;
            }
        } catch (e) { console.error(e); }
    }

    // --- Game Objects ---

    const bird = {
        x: 50,
        y: 150,
        w: 34,
        h: 24,
        radius: 12,
        velocity: 0,
        rotation: 0,
        color: '#f4c430',
        
        draw: function() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Rotation logic based on velocity
            let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
            // When dead, fall straight down
            if (gameState === 'GAMEOVER') rotation = Math.PI / 2;
            
            ctx.rotate(rotation);

            // Body
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, 17, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#553c00';
            ctx.stroke();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(6, -6, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#553c00';
            ctx.stroke();

            // Pupil
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(8, -6, 2, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#e86101';
            ctx.beginPath();
            ctx.moveTo(8, 2);
            ctx.lineTo(18, 6);
            ctx.lineTo(8, 10);
            ctx.fill();
            ctx.stroke();

            // Wing
            ctx.fillStyle = '#e0d040';
            ctx.beginPath();
            ctx.ellipse(-6, 4, 8, 6, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        },
        
        update: function() {
            // Physics
            if (gameState === 'PLAYING') {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                
                // Floor collision
                if (this.y + this.h/2 >= height - 100) { // 100 is ground height approx
                    this.y = height - 100 - this.h/2;
                    gameOver();
                }
                // Ceiling collision
                if (this.y - this.h/2 <= 0) {
                    this.y = this.h/2;
                    this.velocity = 0;
                }
            } else if (gameState === 'GAMEOVER') {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                // Floor collision for game over
                if (this.y + this.h/2 >= height - 100) {
                    this.y = height - 100 - this.h/2;
                    this.velocity = 0;
                }
            }
        },
        
        jump: function() {
            this.velocity = JUMP_STRENGTH;
            playSound('jump');
            createParticles(this.x, this.y + 10, 5, '#fff');
        },
        
        reset: function() {
            this.y = height / 2;
            this.velocity = 0;
            this.rotation = 0;
        }
    };

    class Pipe {
        constructor() {
            this.x = width;
            this.w = 52;
            // Random height for top pipe, leaving gap
            this.topHeight = Math.random() * (height - 250 - GAP_HEIGHT) + 50; 
            this.bottomY = this.topHeight + GAP_HEIGHT;
            this.passed = false;
        }

        draw() {
            // Top Pipe
            ctx.fillStyle = '#73bf2e';
            ctx.strokeStyle = '#558c22';
            ctx.lineWidth = 2;
            
            ctx.fillRect(this.x, 0, this.w, this.topHeight);
            ctx.strokeRect(this.x, 0, this.w, this.topHeight);
            
            // Top Pipe Cap
            ctx.fillRect(this.x - 2, this.topHeight - 24, this.w + 4, 24);
            ctx.strokeRect(this.x - 2, this.topHeight - 24, this.w + 4, 24);

            // Bottom Pipe
            ctx.fillRect(this.x, this.bottomY, this.w, height - this.bottomY);
            ctx.strokeRect(this.x, this.bottomY, this.w, height - this.bottomY);

            // Bottom Pipe Cap
            ctx.fillRect(this.x - 2, this.bottomY, this.w + 4, 24);
            ctx.strokeRect(this.x - 2, this.bottomY, this.w + 4, 24);
            
            // Highlight (simple 3D effect)
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(this.x, 0, 4, this.topHeight);
            ctx.fillRect(this.x, this.bottomY, 4, height - this.bottomY);
        }

        update() {
            this.x -= PIPE_SPEED;
        }
    }

    class Particle {
        constructor(x, y, count, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random() * 4 + 2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.05;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1.0;
        }
    }

    function createParticles(x, y, count, color) {
        for(let i=0; i<count; i++) {
            particles.push(new Particle(x, y, count, color));
        }
    }

    // --- Background & Environment ---
    function drawBackground() {
        // Sky
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, '#4ec0ca');
        gradient.addColorStop(1, '#87e0e5');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        // Clouds (Parallax)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        const cloudOffset = (frames * 0.5) % width;
        
        // Draw some simple clouds
        drawCloud(100 - cloudOffset, 100);
        drawCloud(400 - cloudOffset, 150);
        drawCloud(700 - cloudOffset, 80);
        // Wrap around clouds
        drawCloud(100 - cloudOffset + width, 100);
        drawCloud(400 - cloudOffset + width, 150);
        drawCloud(700 - cloudOffset + width, 80);

        // Cityscape (Parallax - slower)
        const cityOffset = (frames * 0.2) % width;
        ctx.fillStyle = '#ded895';
        drawCity(cityOffset);
        drawCity(cityOffset - width);

        // Ground
        ctx.fillStyle = '#ded895';
        ctx.fillRect(0, height - 100, width, 100);
        ctx.fillStyle = '#73bf2e';
        ctx.fillRect(0, height - 100, width, 12);
        
        // Moving Ground Stripes
        ctx.fillStyle = '#c9b653';
        const groundOffset = (frames * PIPE_SPEED) % 20;
        for(let i = -20; i < width; i+=20) {
            ctx.fillRect(i - groundOffset, height - 80, 10, 80);
        }
    }

    function drawCloud(x, y) {
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.arc(x + 25, y - 10, 35, 0, Math.PI * 2);
        ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawCity(offset) {
        // Simple skyline blocks
        ctx.fillRect(50 - offset, height - 150, 40, 50);
        ctx.fillRect(100 - offset, height - 180, 30, 80);
        ctx.fillRect(150 - offset, height - 140, 50, 40);
        ctx.fillRect(250 - offset, height - 200, 40, 100);
        ctx.fillRect(300 - offset, height - 160, 50, 60);
        ctx.fillRect(400 - offset, height - 190, 30, 90);
        ctx.fillRect(450 - offset, height - 150, 40, 50);
        ctx.fillRect(550 - offset, height - 170, 50, 70);
        ctx.fillRect(650 - offset, height - 140, 40, 40);
        ctx.fillRect(700 - offset, height - 200, 30, 100);
        ctx.fillRect(800 - offset, height - 160, 50, 60);
    }

    // --- Logic ---

    function checkCollision() {
        // AABB Collision
        const bx = bird.x - 12; // shrink hitbox slightly for forgiveness
        const by = bird.y - 8;
        const bw = 24;
        const bh = 16;

        for (let i = 0; i < pipes.length; i++) {
            let p = pipes[i];
            
            // Check Top Pipe
            if (bx < p.x + p.w &&
                bx + bw > p.x &&
                by < p.topHeight &&
                by + bh > 0) {
                return true;
            }
            
            // Check Bottom Pipe
            if (bx < p.x + p.w &&
                bx + bw > p.x &&
                by < height &&
                by + bh > p.bottomY) {
                return true;
            }
        }
        return false;
    }

    function updateScore() {
        for (let i = 0; i < pipes.length; i++) {
            if (pipes[i].x + pipes[i].w < bird.x && !pipes[i].passed) {
                score++;
                pipes[i].passed = true;
                scoreHud.innerText = score;
                playSound('score');
                createParticles(bird.x, bird.y, 10, '#fff');
            }
        }
    }

    function startGame() {
        initAudio();
        gameState = 'PLAYING';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        scoreHud.classList.remove('hidden');
        scoreHud.innerText = '0';
        score = 0;
        pipes = [];
        bird.reset();
        frames = 0;
        loop();
    }

    function gameOver() {
        if (gameState === 'GAMEOVER') return;
        gameState = 'GAMEOVER';
        playSound('hit');
        setTimeout(() => playSound('die'), 200);
        
        // Screen Shake
        canvas.style.transform = 'translate(5px, 5px)';
        setTimeout(() => canvas.style.transform = 'translate(-5px, -5px)', 50);
        setTimeout(() => canvas.style.transform = 'translate(0, 0)', 100);

        // Update High Score
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flappy_highscore', highScore);
            medalText.innerText = "NEW BEST!";
        } else {
            medalText.innerText = "MEDAL";
        }

        // Medal Logic
        let medalColor = '#c0c0c0'; // None
        let medalIcon = '';
        
        if (score >= 10) { medalColor = '#cd7f32'; medalIcon = 'B'; } // Bronze
        if (score >= 20) { medalColor = '#c0c0c0'; medalIcon = 'S'; } // Silver
        if (score >= 30) { medalColor = '#ffd700'; medalIcon = 'G'; } // Gold
        if (score >= 50) { medalColor = '#e5e4e2'; medalIcon = 'P'; } // Platinum

        medalDisplay.style.backgroundColor = medalColor;
        medalDisplay.innerText = medalIcon;

        finalScoreEl.innerText = score;
        bestScoreEl.innerText = highScore;

        setTimeout(() => {
            scoreHud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }, 500);
    }

    // --- Main Loop ---
    function loop() {
        if (gameState === 'START') {
            // Idle animation on start screen
            ctx.clearRect(0, 0, width, height);
            drawBackground();
            bird.y = height/2 + Math.sin(frames * 0.05) * 10;
            bird.draw();
            frames++;
            requestAnimationFrame(loop);
            return;
        }

        if (gameState === 'GAMEOVER' && particles.length === 0 && bird.y >= height - 110) {
            // Stop drawing loop if fully settled to save battery, but we might want to keep background moving
            // For simplicity, we keep drawing but static
            // draw(); // We stop requesting frames, but need to render once more
            // return; 
        }

        ctx.clearRect(0, 0, width, height);
        
        drawBackground();
        
        // Pipes
        if (gameState === 'PLAYING') {
            if (frames % 100 === 0) {
                pipes.push(new Pipe());
            }
        }

        for (let i = 0; i < pipes.length; i++) {
            pipes[i].draw();
            if (gameState === 'PLAYING') {
                pipes[i].update();
            }
            // Remove offscreen pipes
            if (pipes[i].x + pipes[i].w < 0) {
                pipes.splice(i, 1);
                i--;
            }
        }

        // Bird
        bird.update();
        bird.draw();

        // Particles
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }

        if (gameState === 'PLAYING') {
            if (checkCollision()) {
                gameOver();
            }
            updateScore();
            frames++;
        }

        if (gameState !== 'GAMEOVER' || particles.length > 0 || bird.y < height - 110) {
             requestAnimationFrame(loop);
        }
    }

    // --- Input Handling ---
    function handleInput(e) {
        if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
        if (e.type !== 'keydown') e.preventDefault(); // Prevent double firing on some touch devices

        if (gameState === 'START') {
            startGame();
        } else if (gameState === 'PLAYING') {
            bird.jump();
        } else if (gameState === 'GAMEOVER') {
            // Debounce restart slightly
            if (!gameOverScreen.classList.contains('hidden')) {
                 // If game over screen is visible, click/tap to restart
                 // But we use the button for clarity
            }
        }
    }

    window.addEventListener('keydown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
    canvas.addEventListener('mousedown', handleInput);

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // Initial Draw
    resize();
    loop();

</script>
</body>
</html>
